worker_processes 1;

events {
    worker_connections 128;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # FLAG 1 is hidden in the server header
    server_tokens off;
    add_header X-Server-Info "NovaCorp-WebNode-v3.2";

    server {
        listen 80;
        server_name webhost.novatech.local;

        location / {
            root /usr/share/nginx/html;
            index index.html;
        }

        # Hidden admin panel
        location /s3cr3t-admin/ {
            root /usr/share/nginx/html;
            index index.html;
        }
    }

    # Secondary service on port 8443 — looks like a dev/staging server
    server {
        listen 8443;
        server_name staging.novatech.local;

        add_header X-Flag "FLAG{1_http_header_recon}";

        location / {
            return 200 '{"status":"staging","message":"NovaCorp Staging API v0.4.1 — Not for production use"}';
            add_header Content-Type application/json;
            add_header X-Flag "FLAG{1_http_header_recon}";
        }
    }
}
